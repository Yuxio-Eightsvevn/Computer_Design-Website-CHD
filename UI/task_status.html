<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>任务进度管理 - 儿童先心病诊断平台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f7fa; color: #333; min-height: 100vh;
    }
    .container {
      max-width: 1200px; margin: 30px auto; padding: 0 20px;
      display: flex; gap: 16px; align-items: flex-start;
    }
    .sidebar { width: 220px; }
    .main { flex: 1; }
    .navbar {
      background: linear-gradient(135deg,#667eea 0%,#764ba2 100%);
      color: white; padding: 14px 20px; border-radius: 8px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-top: 20px; }
    
    h2 { font-size: 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; background: #eef2f7; color: #64748b; }
    
    /* 任务列表容器 */
    .task-list { display: flex; flex-direction: column; gap: 12px; min-height: 50px; }
    .row-card {
      border: 1px solid #e6eefc; border-radius: 10px; padding: 16px;
      background: white; display: flex; justify-content: space-between; align-items: center;
      transition: all 0.2s;
    }
    .row-card:hover { border-color: #667eea; box-shadow: 0 4px 12px rgba(102,126,234,0.08); }
    
    .task-info { display: flex; flex-direction: column; gap: 4px; }
    .task-name { font-weight: 700; color: #1e293b; font-size: 16px; }
    .task-meta { font-size: 13px; color: #64748b; }

    /* 按钮组 */
    .btn-group { display: flex; gap: 8px; }
    .btn { padding: 8px 14px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; }
    .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-info { background: #f1f5f9; color: #475569; }
    .btn-diag { background: #10b981; color: white; }
    .btn-del { background: #fee2e2; color: #ef4444; }
    .btn-back { background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); }

    /* 状态点 */
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .dot-processing { background: #3b82f6; box-shadow: 0 0 8px #3b82f6; animation: pulse 1.5s infinite; }
    .dot-completed { background: #10b981; }

    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    
    .empty-hint { padding: 20px; text-align: center; color: #94a3b8; font-size: 14px; border: 1px dashed #e2e8f0; border-radius: 10px; }

    /* [新增] 弹窗样式 */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-card {
      background: white; border-radius: 12px; padding: 24px; width: 90%; max-width: 500px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1); animation: slideIn 0.3s ease;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .detail-item { display: flex; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px solid #f8fafc; padding-bottom: 8px; }
    .detail-label { color: #64748b; font-weight: 600; font-size: 14px; }
    .detail-value { color: #1e293b; font-size: 14px; text-align: right; }
    @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    @media (max-width:960px) { .container { flex-direction:column; } .sidebar { width:100%; } }
    /* 背景层 - 伪元素，最底层 */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      opacity: 0.3;
      z-index: -2;
      pointer-events: none;
    }
    body.has-bg::before { background-image: var(--bg-image, none); }
    /* 标题层 - 在背景上，内容下方 */
    .title-overlay { position: fixed; top: 20px; left: 30px; z-index: -1; pointer-events: none; }
    .title-overlay h1 { font-size: 28px; color: #1e293b; text-shadow: 2px 2px 4px rgba(255,255,255,0.8); margin: 0; }
    .title-overlay p { font-size: 14px; color: #64748b; margin: 5px 0 0 0; }
  </style>
</head>
<body>
  <!-- 标题层 -->
  <div class="title-overlay" id="titleOverlay">
    <h1 id="bg-title"></h1>
    <p id="bg-subtitle"></p>
  </div>
  <div class="container">
    <div class="sidebar">
      <div class="card" style="margin-top:0">
        <div style="display:flex;align-items:center;gap:10px;">
          <div id="avatarBox" style="width:48px;height:48px;border-radius:24px;background:#e9eefc;display:flex;align-items:center;justify-content:center;color:#667eea; font-weight:700;">U</div>
          <div>
            <div id="currentUserName" style="font-weight:700">加载中...</div>
            <div id="currentUserOrg" style="font-size:13px;color:#666">...</div>
          </div>
        </div>
        <hr style="margin:12px 0;border:none;border-top:1px solid #f0f3ff;">
        <div style="font-size:13px;color:#64748b;line-height:1.6">
            提示：处理中的任务会在后台自动运行，完成后将移入下方“已完成”列表。
        </div>
      </div>
    </div>

    <div class="main">
      <div class="navbar">
        <div style="font-weight:700; font-size:18px;">📋 已上传任务进度</div>
        <button onclick="window.location.href='/dashboard'" class="btn btn-back">返回上传页</button>
      </div>

      <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <h2><span class="status-dot dot-processing"></span>处理中任务 <span id="countBox2" class="badge">0</span></h2>
            <button class="btn btn-danger btn-sm" onclick="clearAllFailedTasks()" style="padding: 6px 12px; font-size: 13px;">删除所有失败任务</button>
        </div>
        <div id="box2" class="task-list">
            <div class="empty-hint">暂无正在处理的任务</div>
        </div>
      </div>

      <div class="card">
        <h2><span class="status-dot dot-completed"></span>已完成任务 <span id="countBox1" class="badge">0</span></h2>
        <div id="box1" class="task-list">
            <div class="empty-hint">暂无已完成的任务记录</div>
        </div>
      </div>
    </div>
  </div>

  <!-- [通用详情弹窗] -->
  <div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 style="margin:0; color:#1e293b">任务详细信息</h3>
        <button onclick="closeModal()" style="border:none; background:none; cursor:pointer; font-size:24px; color:#94a3b8">&times;</button>
      </div>
      <div id="modalContent"></div>
      <button onclick="closeModal()" class="btn btn-info" style="width:100%; margin-top:10px; background:#667eea; color:white">关闭</button>
    </div>
  </div>

  <!-- [新增：结果下载弹窗] -->
  <div id="downloadOverlay" class="modal-overlay" onclick="closeDownloadModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 style="margin:0; color:#1e293b">📥 结果下载中心</h3>
        <button onclick="closeDownloadModal()" style="border:none; background:none; cursor:pointer; font-size:24px; color:#94a3b8">&times;</button>
      </div>
      <div id="downloadContent"></div>
      <button onclick="closeDownloadModal()" class="btn btn-info" style="width:100%; margin-top:10px; background:#94a3b8; color:white">关闭</button>
    </div>
  </div>

  <script>
    let currentUser = null;
    let pollInterval = null;
    let avatarConfig = { avatars: {} };

    async function loadAvatarConfig() {
        try {
            const r = await fetch('/UI/res/share/user_avatar_config.json');
            if (r.ok) {
                avatarConfig = await r.json();
            }
        } catch (e) {
            console.warn('头像配置加载失败，使用默认头像');
        }
    }

    async function setUserAvatar(avatarElem, username) {
        const avatarPath = avatarConfig.avatars[username];
        if (avatarPath) {
            avatarElem.innerHTML = `<img src="/UI/${avatarPath}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.parentElement.textContent='${username ? username[0].toUpperCase() : 'U'}'">`;
        } else {
            avatarElem.textContent = username ? username[0].toUpperCase() : 'U';
        }
    }

    async function loadUser() {
      await loadAvatarConfig();
      try {
        const r = await fetch('/api/users/current');
        if (r.ok) {
          const d = await r.json();
          if (d && d.data) {
            currentUser = d.data;
            document.getElementById('currentUserName').textContent = currentUser.doctor || currentUser.username;
            document.getElementById('currentUserOrg').textContent = currentUser.organization || '未知机构';
            setUserAvatar(document.getElementById('avatarBox'), currentUser.username);
            fetchTasks();
            pollInterval = setInterval(fetchTasks, 5000);
            return;
          }
        }
      } catch (e) { console.error("Session Error", e); }
      document.getElementById('currentUserName').textContent = "未登录";
    }

    async function fetchTasks() {
      if (!currentUser || !currentUser.username) {
        console.error("currentUser为空或username不存在，无法获取任务列表");
        return;
      }
      try {
        const r = await fetch(`/api/users/${encodeURIComponent(currentUser.username)}/all-tasks`);
        if (!r.ok) {
          console.error("获取任务列表失败，状态码:", r.status);
          return;
        }
        const data = await r.json();
        renderTaskLists(data.tasks || []);
      } catch (e) {
        console.error("Fetch Tasks Error", e);
      }
    }

    function renderTaskLists(tasks) {
      const box1 = document.getElementById('box1');
      const box2 = document.getElementById('box2');
      const completed = tasks.filter(t => t.is_cmp);
      const processing = tasks.filter(t => !t.is_cmp);
      document.getElementById('countBox1').textContent = completed.length;
      document.getElementById('countBox2').textContent = processing.length;
      box1.innerHTML = completed.length ? '' : '<div class="empty-hint">暂无已完成的任务记录</div>';
      completed.forEach(t => box1.appendChild(createTaskRow(t, true)));
      box2.innerHTML = processing.length ? '' : '<div class="empty-hint">暂无正在处理的任务</div>';
      processing.forEach(t => box2.appendChild(createTaskRow(t, false)));
    }

    function showTaskDetail(task) {
      const content = document.getElementById('modalContent');
      content.innerHTML = `
        <div class="detail-item"><span class="detail-label">任务名称</span><span class="detail-value">${task.request_name}</span></div>
        <div class="detail-item"><span class="detail-label">批次ID</span><span class="detail-value" style="font-size:11px">${task.submission_id}</span></div>
        <div class="detail-item"><span class="detail-label">上传时间</span><span class="detail-value">${task.upload_time}</span></div>
        <div class="detail-item"><span class="detail-label">当前状态</span><span class="detail-value" style="color: ${task.is_cmp ? '#10b981' : '#3b82f6'}; font-weight:bold">${task.is_cmp ? '已完成' : '模型判读中'}</span></div>
        ${task.is_cmp ? `<div class="detail-item"><span class="detail-label">完成时间</span><span class="detail-value">${task.cmp_time}</span></div>` : ''}
        <div class="detail-item"><span class="detail-label">病例数量</span><span class="detail-value">${task.request_case_cnt} 个</span></div>
        <div class="detail-item"><span class="detail-label">视频总数</span><span class="detail-value">${task.request_video_cnt} 个</span></div>
        <div class="detail-item"><span class="detail-label">存储路径</span><span class="detail-value" style="font-size:10px; color:#94a3b8; word-break:break-all">${task.request_pos}</span></div>
      `;
      document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modalOverlay').style.display = 'none';
    }

    // [新增：下载中心逻辑]
    async function openDownloadModal(task) {
        const container = document.getElementById('downloadContent');
        container.innerHTML = '<p style="text-align:center; padding:20px; color:#64748b;">正在检索文件列表...</p>';
        document.getElementById('downloadOverlay').style.display = 'flex';

        try {
            const r = await fetch(`/api/tasks/${encodeURIComponent(currentUser.username)}/${task.submission_id}/download-info`);
            const data = await r.json();

            let html = `<div style="margin-bottom:20px">
                <p class="detail-label" style="margin-bottom:10px; border-left:4px solid #10b981; padding-left:8px;">👨‍⚕️ 医师判读结论报告</p>`;
            
            if (data.doctor_report) {
                html += `<div class="row-card" style="padding:12px; margin-bottom:5px; background:#f0fdf4; border-color:#bbf7d0">
                    <div style="flex:1; font-size:13px; color:#166534">
                        <strong>结论 JSON 文件</strong><br/><span style="font-size:11px; color:#15803d">生成于: ${data.doctor_report.time}</span>
                    </div>
                    <a href="${data.doctor_report.url}" download class="btn btn-diag" style="text-decoration:none">下载</a>
                </div>`;
            } else {
                html += `<p style="font-size:13px; color:#94a3b8; padding:10px; background:#f8fafc; border-radius:8px; text-align:center;">尚未提交医师判读结论</p>`;
            }

            html += `</div><div><p class="detail-label" style="margin-bottom:10px; border-left:4px solid #6366f1; padding-left:8px;">🤖 模型处理原始数据 (ZIP)</p>
                     <div style="max-height:200px; overflow-y:auto; padding-right:5px">`;
            
            if (data.model_results && data.model_results.length > 0) {
                data.model_results.forEach(z => {
                    html += `<div class="row-card" style="padding:10px; margin-bottom:5px; background:#f8fafc">
                        <span style="font-size:13px; color:#475569">病例: ${z.case_id}</span>
                        <a href="${z.url}" download class="btn btn-info" style="text-decoration:none; background:#6366f1; color:white">下载包</a>
                    </div>`;
                });
            } else {
                html += `<p style="font-size:13px; color:#94a3b8; text-align:center; padding:10px;">未发现模型输出包</p>`;
            }
            html += `</div></div>`;
            container.innerHTML = html;
        } catch (e) { container.innerHTML = '<p style="color:#ef4444; text-align:center; padding:20px;">获取下载信息失败</p>'; }
    }

    function closeDownloadModal() {
        document.getElementById('downloadOverlay').style.display = 'none';
    }

    function createTaskRow(task, isFinished) {
      const row = document.createElement('div');
      row.className = 'row-card';
      
      // 检查任务状态（处理中/失败/卡住）
      let statusHtml = '';
      let statusColor = '#3b82f6'; // 默认蓝色（处理中）
      let statusText = '⏳ 处理中';
      
      if (!isFinished) {
        // 根据task_status字段显示不同的状态
        if (task && task.task_status) {
          switch(task.task_status) {
            case 'processing':
              statusColor = '#3b82f6'; // 蓝色 - 处理中
              statusText = '⏳ 处理中';
              break;
            case 'failed':
              statusColor = '#ef4444'; // 红色 - 失败
              statusText = '❌ 失败';
              break;
            case 'stuck':
              statusColor = '#f59e0b'; // 橙色 - 卡住
              statusText = '⚠️ 卡住';
              break;
            default:
              statusColor = '#3b82f6'; // 默认蓝色
              statusText = '⏳ 处理中';
          }
        } else {
          // 向后兼容：使用旧的has_failed逻辑
          const hasFailed = task && task.has_failed !== undefined ? task.has_failed : false;
          statusColor = hasFailed ? '#ef4444' : '#3b82f6';
          statusText = hasFailed ? '❌ 失败' : '⏳ 处理中';
        }
        
        statusHtml = `<div style="font-size: 12px; color: ${statusColor}; font-weight: 600; margin-top: 4px;">
          ${statusText}
        </div>`;
      }
      
      const infoHtml = `
        <div class="task-info">
          <div class="task-name">${task ? task.request_name : '未知任务'}</div>
          <div class="task-meta">
            上传时间：${task ? task.upload_time : '未知'} | 病例数：${task ? task.request_case_cnt : '0'} | 视频数：${task ? task.request_video_cnt : '0'}
            ${isFinished ? `<br/>完成时间：${task ? task.cmp_time : '未知'}` : ''}
            ${statusHtml}
          </div>
        </div>
      `;
      const btnGroup = document.createElement('div');
      btnGroup.className = 'btn-group';
      const btnInfo = document.createElement('button');
      btnInfo.className = 'btn btn-info';
      btnInfo.textContent = '查看详情';
      btnInfo.onclick = () => showTaskDetail(task);
      btnGroup.appendChild(btnInfo);
      
      if (isFinished) {
        // [新增：结果下载按钮]
        const btnDown = document.createElement('button');
        btnDown.className = 'btn btn-info';
        btnDown.style.background = '#6366f1'; btnDown.style.color = 'white';
        btnDown.textContent = '结果下载';
        btnDown.onclick = () => openDownloadModal(task);
        btnGroup.appendChild(btnDown);

        // 按钮 2: 进入判读
        const btnDiag = document.createElement('button');
        btnDiag.className = 'btn btn-diag';
        btnDiag.textContent = '进入判读';
        
        btnDiag.onclick = () => {
            if (!currentUser || !currentUser.username) {
                alert('请先登录');
                return;
            }
            const userName = encodeURIComponent(currentUser.username);
            const taskFolderName = encodeURIComponent(task.submission_id);
            const taskDisplayName = encodeURIComponent(task.request_name);
            // 带上 mode=diag 以供适配
            window.location.href = `/diagnosis?username=${userName}&task=${taskFolderName}&taskName=${taskDisplayName}&mode=diag`;
        };
        
        btnGroup.appendChild(btnDiag);
        const btnDel = document.createElement('button');
        btnDel.className = 'btn btn-del';
        btnDel.textContent = '删除';
        btnDel.onclick = () => deleteTask(task.submission_id);
        btnGroup.appendChild(btnDel);
      }
      row.innerHTML = infoHtml;
      row.appendChild(btnGroup);
      return row;
    }

    async function clearAllFailedTasks() {
      if (!confirm("确定要删除所有失败任务吗？此操作将永久删除所有标记为失败的任务。")) return;
      try {
        const r = await fetch(`/api/users/${encodeURIComponent(currentUser.username)}/clear-stuck-tasks`, {
          method: 'DELETE'
        });
        if (r.ok) {
          const result = await r.json();
          alert(`成功清理 ${result.deleted_count} 个失败任务`);
          fetchTasks();
        } else {
          const error = await r.json();
          alert(`清理失败: ${error.detail}`);
        }
      } catch (e) {
        alert("网络错误，请重试");
      }
    }

    async function deleteTask(subId) {
      if (!confirm("确定要永久删除此任务及其所有相关文件吗？该操作不可撤销。")) return;
      try {
        const r = await fetch(`/api/users/${encodeURIComponent(currentUser.username)}/tasks/${subId}`, {
          method: 'DELETE'
        });
        if (r.ok) { fetchTasks(); } else { alert("删除失败"); }
      } catch (e) { alert("网络错误"); }
    }

    loadUser();

    // 初始化背景配置
    (async function initBackground() {
      try {
        const r = await fetch('/res/share/background_config.json');
        const config = await r.json();
        if (config.enabled) {
          // 背景图控制
          if (config.showBackground && config.image) {
            document.body.style.setProperty('--bg-image', `url('/res/share/${config.image}')`);
            document.body.classList.add('has-bg');
          } else {
            document.body.classList.remove('has-bg');
          }
          // 标题控制
          if (config.showTitle) {
            document.getElementById('bg-title').textContent = config.title || '';
            document.getElementById('bg-subtitle').textContent = config.subtitle || '';
            document.getElementById('titleOverlay').style.display = 'block';
          } else {
            document.getElementById('titleOverlay').style.display = 'none';
          }
        } else {
          document.getElementById('titleOverlay').style.display = 'none';
          document.body.classList.remove('has-bg');
        }
      } catch (e) { console.warn('背景配置加载失败:', e); }
    })();
  </script>
</body>
</html>
