<!DOCTYPE html>
<html>
<head>
    <title>登录 - CHD-AIDE</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="res/admin/css/main.css">
    <style>
        :root {
            --primary-color: #3a7bd5;
            --primary-dark: #3069b4;
            --text-light: #888;
            --text-dark: #333;
            --bg-light: #f5f7fa;
            --max-width: 1440px;
        }

        body {
            background: var(--bg-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }

        /* 背景层 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.3;
            z-index: -2;
            pointer-events: none;
        }
        body.has-bg::before { background-image: var(--bg-image, none); }
        body.has-bg { background: #f5f7fa; }

        /* Header */
        .header {
            width: 95%;
            max-width: var(--max-width);
            height: 60px;
            background: linear-gradient(135deg, var(--primary-color) 0%, #5a9bd4 100%);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 0 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(58, 123, 213, 0.3);
        }
        .header-title {
            color: white;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* TitleField */
        .title-field {
            width: 90%;
            max-width: var(--max-width);
            display: flex;
            gap: 40px;
            margin-bottom: 30px;
            background: white;
            border-radius: 16px;
            padding: 52px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .title-field-left {
            flex: 0 0 60%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .title-field-left img {
            max-width: 100%;
            max-height: 390px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .title-field-right {
            flex: 0 0 40%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-right: 20px;
        }
        .welcome-text {
            color: var(--text-light);
            font-size: 16px;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        .main-title {
            color: var(--text-dark);
            font-size: 50px;
            font-weight: 800;
            margin: 0 0 8px 0;
            letter-spacing: 4px;
        }
        .subtitle {
            color: var(--primary-color);
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }
        .description-text {
            color: var(--text-light);
            font-size: 15px;
            line-height: 2;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-justify: inter-character;
            text-align: justify;
        }
        .login-btn-title {
            padding: 18px 50px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            align-self: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(58, 123, 213, 0.3);
        }
        .login-btn-title:hover {
            filter: brightness(1.1);
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(58, 123, 213, 0.4);
        }

        /* Keywords */
        .keywords-section {
            width: 90%;
            max-width: var(--max-width);
            display: flex;
            justify-content: space-evenly;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .keyword-item {
            font-size: 16px;
            color: var(--primary-color);
            font-weight: 500;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        .keyword-item:hover {
            color: var(--primary-dark);
        }

        /* MainContent */
        .main-content {
            width: 90%;
            max-width: var(--max-width);
        }

        /* 轮播图 */
        .carousel-container {
            width: 100%;
            margin-bottom: 30px;
        }
        .carousel-viewport {
            position: relative;
            width: 100%;
            height: 455px;
            perspective: 1000px;
            overflow: hidden;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .carousel-stack {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .carousel-card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.6s ease, opacity 0.6s ease;
            cursor: pointer;
            background: #f0f0f0;
        }
        .carousel-card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .carousel-card .card-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
            font-size: 16px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .carousel-card:hover .card-caption {
            opacity: 1;
        }
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
        }
        .carousel-dot {
            width: 8px;
            height: 8px;
            background: #ccc;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .carousel-dot.active {
            background: var(--primary-color);
            width: 24px;
        }
        .carousel-dot:hover {
            background: var(--primary-color);
        }

        /* 核心功能 */
        .features-title {
            color: var(--text-dark);
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 25px;
        }
        .features-row {
            display: flex;
            gap: 20px;
        }
        .feature-item {
            flex: 1;
            width: 33.33%;
            text-align: center;
        }
        .feature-content {
            display: inline-block;
            width: 80%;
            text-align: left;
        }
        .feature-content h3 {
            color: var(--primary-color);
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 10px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary-color);
        }
        .feature-content p {
            color: var(--text-light);
            font-size: 17px;
            line-height: 1.7;
            margin: 12px 0 0 0;
        }

        /* 登录弹窗 */
        .login-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .login-modal.show { display: flex; }
        .login-modal-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 380px;
            max-width: 90%;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-modal-card .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: transparent;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #999;
            padding: 5px 10px;
            transition: color 0.3s;
        }
        .login-modal-card .close-btn:hover { color: #333; }
        .login-modal-card h2 {
            margin-bottom: 25px;
            text-align: center;
            font-size: 24px;
            color: var(--text-dark);
        }
        .login-modal-card .form-group {
            margin-bottom: 18px;
        }
        .login-modal-card .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-dark);
        }
        .login-modal-card .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        .login-modal-card .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .login-modal-card .login-btn {
            width: 100%;
            padding: 14px 24px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .login-modal-card .login-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .login-modal-card .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .login-modal-card .error-msg {
            background: #fdf0f0;
            color: #c00;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
            text-align: center;
        }
        .login-modal-card .error-msg.show { display: block; }
    </style>
</head>
<body class="no-sidebar is-preload">
    <!-- Header -->
    <header class="header">
        <span class="header-title" id="headerTitle"></span>
    </header>

    <!-- TitleField -->
    <section class="title-field">
        <div class="title-field-left">
            <img id="titleImage" src="res/admin/images/pic_01.png" alt="平台图片">
        </div>
        <div class="title-field-right">
            <p class="welcome-text" id="welcomeText"></p>
            <h1 class="main-title" id="mainTitle"></h1>
            <p class="subtitle" id="subtitle"></p>
            <p class="description-text" id="descriptionText"></p>
            <button class="login-btn-title" id="loginBtnTitle" onclick="openLoginModal()"></button>
        </div>
    </section>

    <!-- Keywords -->
    <section class="keywords-section" id="keywordsSection"></section>

    <!-- MainContent -->
    <main class="main-content">
        <!-- 轮播图 -->
        <div class="carousel-container">
            <div class="carousel-viewport">
                <div class="carousel-stack" id="carouselStack"></div>
            </div>
            <div class="carousel-dots" id="carouselDots"></div>
        </div>

        <!-- 核心功能 -->
        <h2 class="features-title" id="featuresTitle">核心功能</h2>
        <div class="features-row" id="featuresRow"></div>
    </main>

    <!-- Login Modal -->
    <div class="login-modal" id="loginModal">
        <div class="login-modal-card">
            <span class="close-btn" onclick="closeLoginModal()">&times;</span>
            <h2>登录</h2>
            <div class="error-msg" id="loginError"></div>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUsername" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码" required>
            </div>
            <button class="login-btn" id="loginBtn" onclick="doLogin()">登录</button>
        </div>
    </div>

    <script src="res/admin/js/jquery.min.js"></script>
    <script src="res/admin/js/browser.min.js"></script>
    <script src="res/admin/js/breakpoints.min.js"></script>
    <script src="res/admin/js/util.js"></script>
    <script src="res/admin/js/main.js"></script>
    <script>
        var config = {};
        var carouselImages = [];
        var currentSlide = 0;
        var carouselInterval = null;

        async function loadConfig() {
            try {
                var resp = await fetch('UI/login_config.json');
                config = await resp.json();
                renderContent();
                applyBackground();
            } catch (e) {
                console.error('加载配置失败:', e);
            }
        }

        async function loadCarouselImages() {
            try {
                var resp = await fetch('res/admin/images/carousel_images.json');
                carouselImages = await resp.json();
                renderCarousel();
                startAutoPlay();
            } catch (e) {
                console.error('加载轮播图片失败:', e);
            }
        }

        function applyBackground() {
            if (config.background && config.background.trim() !== '') {
                document.body.classList.add('has-bg');
                document.body.style.setProperty('--bg-image', 'url(' + config.background + ')');
            } else {
                document.body.classList.remove('has-bg');
            }
        }

        function renderContent() {
            // Header
            if (config.header && config.header.title) {
                document.getElementById('headerTitle').textContent = config.header.title;
            }

            // TitleField
            if (config.titleField) {
                var tf = config.titleField;
                if (tf.image) {
                    document.getElementById('titleImage').src = tf.image;
                }
                if (tf.welcomeText) {
                    document.getElementById('welcomeText').textContent = tf.welcomeText;
                }
                if (tf.mainTitle) {
                    document.getElementById('mainTitle').textContent = tf.mainTitle;
                }
                if (tf.subtitle) {
                    document.getElementById('subtitle').textContent = tf.subtitle;
                }
                if (tf.description) {
                    document.getElementById('descriptionText').textContent = tf.description;
                }
                if (tf.loginButtonText) {
                    document.getElementById('loginBtnTitle').textContent = tf.loginButtonText;
                }
            }

            // Keywords
            var keywordsSection = document.getElementById('keywordsSection');
            if (config.keywords && keywordsSection) {
                keywordsSection.innerHTML = config.keywords.map(function(k) {
                    return '<div class="keyword-item">' + k.text + '</div>';
                }).join('');
            }

            // Features
            var featuresRow = document.getElementById('featuresRow');
            if (config.features && featuresRow) {
                featuresRow.innerHTML = config.features.map(function(f) {
                    return '<div class="feature-item">' +
                        '<div class="feature-content">' +
                            '<h3>' + f.title + '</h3>' +
                            '<p>' + f.description + '</p>' +
                        '</div>' +
                    '</div>';
                }).join('');
            }

            // Document title
            if (config.header && config.header.title) {
                document.title = '登录 - ' + config.header.title;
            }
        }

        function renderCarousel() {
            var stack = document.getElementById('carouselStack');
            var dots = document.getElementById('carouselDots');
            if (!stack || !carouselImages.length) return;

            stack.innerHTML = carouselImages.map(function(img, i) {
                return '<div class="carousel-card" data-index="' + i + '">' +
                    '<img src="res/admin/images/' + img.filename + '" alt="' + img.caption + '">' +
                    '<div class="card-caption">' + img.caption + '</div>' +
                '</div>';
            }).join('');

            dots.innerHTML = carouselImages.map(function(_, i) {
                return '<div class="carousel-dot' + (i === 0 ? ' active' : '') + '" data-index="' + i + '"></div>';
            }).join('');

            updateCarouselPositions();

            dots.querySelectorAll('.carousel-dot').forEach(function(dot) {
                dot.addEventListener('click', function() {
                    goToSlide(parseInt(this.dataset.index));
                });
            });
        }

        function updateCarouselPositions() {
            var cards = document.querySelectorAll('.carousel-card');
            var total = carouselImages.length;

            cards.forEach(function(card, i) {
                var offset = i - currentSlide;
                var absOffset = Math.abs(offset);

                if (offset === 0) {
                    card.style.transform = 'translateX(0) scale(1)';
                    card.style.zIndex = total;
                    card.style.opacity = '1';
                } else {
                    var scale = 1 - (absOffset * 0.05);
                    var translateX = offset > 0 ? '30px' : '-30px';
                    var translateY = absOffset * 8 + 'px';
                    card.style.transform = 'translateX(' + translateX + ') translateY(' + translateY + ') scale(' + scale + ')';
                    card.style.zIndex = total - absOffset;
                    card.style.opacity = absOffset > 2 ? '0' : '0.6';
                }
            });

            document.querySelectorAll('.carousel-dot').forEach(function(dot, i) {
                dot.classList.toggle('active', i === currentSlide);
            });
        }

        function goToSlide(index) {
            currentSlide = index;
            updateCarouselPositions();
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % carouselImages.length;
            updateCarouselPositions();
        }

        function startAutoPlay() {
            if (carouselInterval) clearInterval(carouselInterval);
            carouselInterval = setInterval(nextSlide, 5000);
        }

        function openLoginModal() {
            document.getElementById('loginModal').classList.add('show');
            document.getElementById('loginUsername').focus();
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('show');
        }

        document.getElementById('loginModal').addEventListener('click', function(e) {
            if (e.target === this) closeLoginModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeLoginModal();
        });

        function showLoginError(msg) {
            var el = document.getElementById('loginError');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(function() { el.classList.remove('show'); }, 5000);
        }

        async function doLogin() {
            var username = document.getElementById('loginUsername').value.trim();
            var password = document.getElementById('loginPassword').value;
            var btn = document.getElementById('loginBtn');

            if (!username || !password) {
                showLoginError('请填写用户名和密码');
                return;
            }

            btn.disabled = true;
            btn.textContent = '登录中...';

            try {
                var res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                var data = await res.json();
                if (!res.ok) throw new Error(data.detail || '登录失败');
                localStorage.setItem('userData', JSON.stringify(data.data));
                window.location.href = '/flow';
            } catch (e) {
                showLoginError(e.message);
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }

        document.getElementById('loginPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') doLogin();
        });

        loadConfig();
        loadCarouselImages();
    </script>
</body>
</html>
