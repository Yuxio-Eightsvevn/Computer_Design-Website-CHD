<!DOCTYPE html>
<html>
<head>
    <title>登录 - 儿童先心病智能诊断平台</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="res/admin/css/main.css">
    <style>
        #header .top-right {
            display: none;
        }
        #header .click-login {
            margin-top: 20px;
            padding: 18px 50px;
            font-size: 19px;
            background: #3a7bd5 !important;
            color: white !important;
        }
        #header > .container {
            border-bottom: none !important;
            box-shadow: none !important;
        }
        #content > article:first-child {
            border-top: none !important;
            box-shadow: none !important;
        }
        #header h1 {
            color: #3a7bd5 !important;
        }
        #header p {
            color: #555 !important;
        }
        h3#featuresTitle {
            color: #333 !important;
        }
        .feature .box p {
            color: #555 !important;
        }
        #tagline {
            color: #333 !important;
        }
        section.box h3 {
            color: #3a7bd5 !important;
        }
        section.box header {
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
            margin-bottom: 5px;
        }
        section.box p {
            color: #444 !important;
            margin: 0 5px;
        }
        .login-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .login-modal.show { display: flex; }
        .login-modal-card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            width: 360px;
            max-width: 90%;
            position: relative;
        }
        .login-modal-card .close-btn {
            position: absolute;
            top: 12px;
            right: 15px;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            -webkit-box-shadow: none !important;
            font-size: 14px;
            cursor: pointer;
            color: #333 !important;
            padding: 5px 10px;
            text-shadow: none !important;
            outline: none !important;
            display: inline-block;
        }
        .login-modal-card .close-btn:visited,
        .login-modal-card .close-btn:focus,
        .login-modal-card .close-btn:active {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            color: #333 !important;
        }
        .login-modal-card .close-btn:hover { color: #333; }
        .login-modal-card h2 {
            margin-bottom: 25px;
            text-align: center;
            font-size: 22px;
        }
        .login-modal-card .form-group {
            margin-bottom: 18px;
        }
        .login-modal-card .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
        }
        .login-modal-card .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .login-modal-card .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .login-modal-card .login-btn {
            width: 100%;
            padding: 14px 24px;
            background: #3a7bd5;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-modal-card .login-btn:hover { background: #3069b4; }
        .login-modal-card .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .login-modal-card .error-msg {
            background: #fdf0f0;
            color: #c00;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 13px;
            display: none;
        }
        .login-modal-card .error-msg.show { display: block; }

        /* 轮播图样式 */
        .carousel-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto 30px;
        }
        .carousel-viewport {
            position: relative;
            width: 100%;
            height: 400px;
            perspective: 1000px;
            overflow: hidden;
        }
        .carousel-stack {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .carousel-card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.6s ease, opacity 0.6s ease;
            cursor: pointer;
            background: #f0f0f0;
        }
        .carousel-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .carousel-card .card-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
            font-size: 16px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .carousel-card:hover .card-caption {
            opacity: 1;
        }
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
        }
        .carousel-dot {
            width: 8px;
            height: 8px;
            background: #ccc;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .carousel-dot.active {
            background: #333;
            width: 24px;
        }
        .carousel-dot:hover {
            background: #666;
        }
    </style>
</head>
<body class="no-sidebar is-preload">
    <div id="page-wrapper">

        <!-- Header -->
        <section id="header">
            <div class="container" style="position: relative;">
                <h1 id="logo"></h1>
                <p id="subtitle"></p>
                <button class="button click-login" id="btnBelow" onclick="openLoginModal()"></button>
                <div class="top-right">
                    <a href="#" class="button" id="btnTopRight" onclick="openLoginModal()"></a>
                </div>
            </div>
        </section>

        <!-- Main -->
        <section id="main">
            <div class="container">
                <div id="content">
                    <article class="box post">
                        <header>
                            <h2 id="tagline" style="font-size:24px;"></h2>
                        </header>

                        <!-- 轮播图 -->
                        <div class="carousel-container">
                            <div class="carousel-viewport">
                                <div class="carousel-stack" id="carouselStack"></div>
                            </div>
                            <div class="carousel-dots" id="carouselDots"></div>
                        </div>

                        <h3 id="featuresTitle">核心功能</h3>
                        <div class="row" id="featuresRow"></div>
                    </article>
                </div>
            </div>
        </section>

    </div>

    <!-- Login Modal -->
    <div class="login-modal" id="loginModal">
        <div class="login-modal-card">
            <span class="close-btn" onclick="closeLoginModal()">关闭</span>
            <h2>登录</h2>
            <div class="error-msg" id="loginError"></div>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUsername" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码" required>
            </div>
            <button class="login-btn" id="loginBtn" onclick="doLogin()">登录</button>
        </div>
    </div>

    <script src="res/admin/js/jquery.min.js"></script>
    <script src="res/admin/js/browser.min.js"></script>
    <script src="res/admin/js/breakpoints.min.js"></script>
    <script src="res/admin/js/util.js"></script>
    <script src="res/admin/js/main.js"></script>
    <script>
        var config = {};
        var carouselImages = [];
        var currentSlide = 0;
        var carouselInterval = null;

        async function loadConfig() {
            try {
                var resp = await fetch('UI/login_config.json');
                config = await resp.json();
                renderContent();
            } catch (e) {
                console.error('加载配置失败:', e);
            }
        }

        async function loadCarouselImages() {
            try {
                var resp = await fetch('res/admin/images/carousel_images.json');
                carouselImages = await resp.json();
                renderCarousel();
                startAutoPlay();
            } catch (e) {
                console.error('加载轮播图片失败:', e);
            }
        }

        function renderCarousel() {
            var stack = document.getElementById('carouselStack');
            var dots = document.getElementById('carouselDots');
            if (!stack || !carouselImages.length) return;

            stack.innerHTML = carouselImages.map(function(img, i) {
                return '<div class="carousel-card" data-index="' + i + '">' +
                    '<img src="res/admin/images/' + img.filename + '" alt="' + img.caption + '">' +
                    '<div class="card-caption">' + img.caption + '</div>' +
                '</div>';
            }).join('');

            dots.innerHTML = carouselImages.map(function(_, i) {
                return '<div class="carousel-dot' + (i === 0 ? ' active' : '') + '" data-index="' + i + '"></div>';
            }).join('');

            updateCarouselPositions();

            dots.querySelectorAll('.carousel-dot').forEach(function(dot) {
                dot.addEventListener('click', function() {
                    goToSlide(parseInt(this.dataset.index));
                });
            });
        }

        function updateCarouselPositions() {
            var cards = document.querySelectorAll('.carousel-card');
            var total = carouselImages.length;

            cards.forEach(function(card, i) {
                var offset = i - currentSlide;
                var absOffset = Math.abs(offset);

                if (offset === 0) {
                    card.style.transform = 'translateX(0) scale(1)';
                    card.style.zIndex = total;
                    card.style.opacity = '1';
                } else {
                    var scale = 1 - (absOffset * 0.05);
                    var translateX = offset > 0 ? '30px' : '-30px';
                    var translateY = absOffset * 8 + 'px';
                    card.style.transform = 'translateX(' + translateX + ') translateY(' + translateY + ') scale(' + scale + ')';
                    card.style.zIndex = total - absOffset;
                    card.style.opacity = absOffset > 2 ? '0' : '0.6';
                }
            });

            document.querySelectorAll('.carousel-dot').forEach(function(dot, i) {
                dot.classList.toggle('active', i === currentSlide);
            });
        }

        function goToSlide(index) {
            currentSlide = index;
            updateCarouselPositions();
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % carouselImages.length;
            updateCarouselPositions();
        }

        function startAutoPlay() {
            if (carouselInterval) clearInterval(carouselInterval);
            carouselInterval = setInterval(nextSlide, 5000);
        }

        function renderContent() {
            if (config.platform) {
                document.title = '登录 - ' + config.platform.name;
                document.getElementById('logo').textContent = config.platform.name;
                document.getElementById('subtitle').textContent = config.platform.subtitle;
                document.getElementById('tagline').innerHTML = config.platform.tagline + '<br />' + (config.platform.tagline2 || '');
            }

            if (config.buttons) {
                document.getElementById('btnTopRight').textContent = config.buttons.topRight || '医师入口';
                document.getElementById('btnBelow').textContent = config.buttons.titleBelow || '点击登录';
            }

            var featuresRow = document.getElementById('featuresRow');
            if (config.features && featuresRow) {
                featuresRow.innerHTML = config.features.map(function(f) {
                    return '<div class="col-4 col-12-small">' +
                        '<section class="box">' +
                            '<header><h3>' + f.title + '</h3></header>' +
                            '<p>' + f.description + '</p>' +
                        '</section>' +
                    '</div>';
                }).join('');
            }
        }

        function openLoginModal() {
            document.getElementById('loginModal').classList.add('show');
            document.getElementById('loginUsername').focus();
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('show');
        }

        document.getElementById('loginModal').addEventListener('click', function(e) {
            if (e.target === this) closeLoginModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeLoginModal();
        });

        function showLoginError(msg) {
            var el = document.getElementById('loginError');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(function() { el.classList.remove('show'); }, 5000);
        }

        async function doLogin() {
            var username = document.getElementById('loginUsername').value.trim();
            var password = document.getElementById('loginPassword').value;
            var btn = document.getElementById('loginBtn');

            if (!username || !password) {
                showLoginError('请填写用户名和密码');
                return;
            }

            btn.disabled = true;
            btn.textContent = '登录中...';

            try {
                var res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                var data = await res.json();
                if (!res.ok) throw new Error(data.detail || '登录失败');
                localStorage.setItem('userData', JSON.stringify(data.data));
                window.location.href = '/flow';
            } catch (e) {
                showLoginError(e.message);
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }

        document.getElementById('loginPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') doLogin();
        });

        loadConfig();
        loadCarouselImages();
    </script>
</body>
</html>
