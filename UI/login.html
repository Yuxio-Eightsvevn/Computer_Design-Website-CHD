<!DOCTYPE html>
<html>
<head>
    <title>登录 - 儿童先心病智能诊断平台</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="res/admin/css/main.css">
    <style>
        #header .top-right {
            position: absolute;
            top: 30px;
            right: 30px;
        }
        #header .click-login {
            margin-top: 15px;
        }
        .login-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .login-modal.show { display: flex; }
        .login-modal-card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            width: 360px;
            max-width: 90%;
            position: relative;
        }
        .login-modal-card .close-btn {
            position: absolute;
            top: 12px;
            right: 15px;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            -webkit-box-shadow: none !important;
            font-size: 14px;
            cursor: pointer;
            color: #333 !important;
            padding: 5px 10px;
            text-shadow: none !important;
            outline: none !important;
            display: inline-block;
        }
        .login-modal-card .close-btn:visited,
        .login-modal-card .close-btn:focus,
        .login-modal-card .close-btn:active {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            color: #333 !important;
        }
        .login-modal-card .close-btn:hover { color: #333; }
        .login-modal-card h2 {
            margin-bottom: 25px;
            text-align: center;
            font-size: 22px;
        }
        .login-modal-card .form-group {
            margin-bottom: 18px;
        }
        .login-modal-card .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
        }
        .login-modal-card .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .login-modal-card .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .login-modal-card .login-btn {
            width: 100%;
            padding: 14px 24px;
            background: #3a7bd5;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-modal-card .login-btn:hover { background: #3069b4; }
        .login-modal-card .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .login-modal-card .error-msg {
            background: #fdf0f0;
            color: #c00;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 13px;
            display: none;
        }
        .login-modal-card .error-msg.show { display: block; }
    </style>
</head>
<body class="no-sidebar is-preload">
    <div id="page-wrapper">

        <!-- Header -->
        <section id="header">
            <div class="container" style="position: relative;">
                <h1 id="logo"></h1>
                <p id="subtitle"></p>
                <button class="button click-login" id="btnBelow" onclick="openLoginModal()"></button>
                <div class="top-right">
                    <a href="#" class="button" id="btnTopRight" onclick="openLoginModal()"></a>
                </div>
            </div>
        </section>

        <!-- Main -->
        <section id="main">
            <div class="container">
                <div id="content">
                    <article class="box post">
                        <header>
                            <h2 id="tagline" style="font-size:24px;"></h2>
                        </header>
                        <span class="image featured"><img src="res/admin/images/pic04.jpg" alt="" /></span>
                        
                        <h3 id="featuresTitle">核心功能</h3>
                        <div class="row" id="featuresRow">
                        </div>
                    </article>
                </div>
            </div>
        </section>

    </div>

    <!-- Login Modal -->
    <div class="login-modal" id="loginModal">
        <div class="login-modal-card">
            <span class="close-btn" onclick="closeLoginModal()">关闭</span>
            <h2>登录</h2>
            <div class="error-msg" id="loginError"></div>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUsername" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码" required>
            </div>
            <button class="login-btn" id="loginBtn" onclick="doLogin()">登录</button>
        </div>
    </div>

    <script src="res/admin/js/jquery.min.js"></script>
    <script src="res/admin/js/browser.min.js"></script>
    <script src="res/admin/js/breakpoints.min.js"></script>
    <script src="res/admin/js/util.js"></script>
    <script src="res/admin/js/main.js"></script>
    <script>
        var config = {};

        async function loadConfig() {
            try {
                var resp = await fetch('UI/login_config.json');
                config = await resp.json();
                renderContent();
            } catch (e) {
                console.error('加载配置失败:', e);
            }
        }

        function renderContent() {
            if (config.platform) {
                document.title = '登录 - ' + config.platform.name;
                document.getElementById('logo').textContent = config.platform.name;
                document.getElementById('subtitle').textContent = config.platform.subtitle;
                document.getElementById('tagline').innerHTML = config.platform.tagline + '<br />' + (config.platform.tagline2 || '');
            }

            if (config.buttons) {
                document.getElementById('btnTopRight').textContent = config.buttons.topRight || '医师入口';
                document.getElementById('btnBelow').textContent = config.buttons.titleBelow || '点击登录';
            }

            var featuresRow = document.getElementById('featuresRow');
            if (config.features && featuresRow) {
                featuresRow.innerHTML = config.features.map(function(f) {
                    return '<div class="col-4 col-12-small">' +
                        '<section class="box">' +
                            '<header><h3>' + f.title + '</h3></header>' +
                            '<p>' + f.description + '</p>' +
                        '</section>' +
                    '</div>';
                }).join('');
            }
        }

        function openLoginModal() {
            document.getElementById('loginModal').classList.add('show');
            document.getElementById('loginUsername').focus();
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('show');
        }

        document.getElementById('loginModal').addEventListener('click', function(e) {
            if (e.target === this) closeLoginModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeLoginModal();
        });

        function showLoginError(msg) {
            var el = document.getElementById('loginError');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(function() { el.classList.remove('show'); }, 5000);
        }

        async function doLogin() {
            var username = document.getElementById('loginUsername').value.trim();
            var password = document.getElementById('loginPassword').value;
            var btn = document.getElementById('loginBtn');

            if (!username || !password) {
                showLoginError('请填写用户名和密码');
                return;
            }

            btn.disabled = true;
            btn.textContent = '登录中...';

            try {
                var res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                var data = await res.json();
                if (!res.ok) throw new Error(data.detail || '登录失败');
                localStorage.setItem('userData', JSON.stringify(data.data));
                window.location.href = '/flow';
            } catch (e) {
                showLoginError(e.message);
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }

        document.getElementById('loginPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') doLogin();
        });

        loadConfig();
    </script>
</body>
</html>
