<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180" role="img" aria-label="视频示意图">
  <defs>
    <linearGradient id="vbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="vplay" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#667eea"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#vbg)"/>
  <!-- 超声/心电波形 -->
  <polyline points="24,150 70,150 88,120 108,168 128,104 148,150 296,150"
            fill="none" stroke="#a5b4fc" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- 播放按钮圆 -->
  <circle cx="160" cy="78" r="40" fill="url(#vplay)" opacity="0.95"/>
  <!-- 播放三角 -->
  <path d="M150 60 L150 96 L180 78 Z" fill="#ffffff"/>
</svg>
