<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>教育练习 - 儿童先心病诊断平台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f7fa; color: #333; min-height: 100vh; }
    .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; display: flex; gap: 16px; align-items: flex-start; }
    .sidebar { width: 240px; flex-shrink: 0; }
    .main { flex: 1; }
    .navbar { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; padding: 15px 25px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
    .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-top: 20px; }
    .task-card { background: white; border-radius: 10px; padding: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e2e8f0; transition: all 0.2s; }
    .task-card:hover { border-color: #10b981; transform: translateX(5px); }
    .task-card.completed { border-left: 5px solid #10b981; }
    .task-card.pending { border-left: 5px solid #f59e0b; }
    .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; }
    .btn-start { background: #10b981; color: white; }
    .btn-view { background: #f1f5f9; color: #475569; }
    .score-badge { font-size: 20px; font-weight: 800; color: #10b981; }
    /* 弹窗样式 */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-card { background: white; border-radius: 12px; padding: 30px; width: 90%; max-width: 700px; text-align: center; }
    .metric-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 20px 0; }
    .metric-item { background: #f8fafc; padding: 15px; border-radius: 10px; }
    .metric-val { font-size: 22px; font-weight: 700; color: #1e293b; }
    .metric-label { font-size: 12px; color: #64748b; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
        <div class="card" style="margin-top:0">
            <div style="display:flex;align-items:center;gap:10px;">
              <div id="avatar" style="width:48px;height:48px;border-radius:24px;background:#ecfdf5;display:flex;align-items:center;justify-content:center;color:#10b981; font-weight:700;">U</div>
              <div><div id="u-name" style="font-weight:700">加载中...</div><div id="currentUserOrg" style="font-size:12px;color:#666">...</div></div>
            </div>
            <hr style="margin:12px 0;border:none;border-top:1px solid #f1f5f9;">
            <p style="font-size:12px; color:#64748b; line-height:1.6">点击“开始判读”进行练习。完成后可查收详细评估报告，包含准确率、敏感度等指标。</p>
        </div>
    </div>
    <div class="main">
      <div class="navbar"><div>🎓 教育练习中心</div><button onclick="window.location.href='/flow'" class="btn" style="background:rgba(255,255,255,0.2); color:white">返回</button></div>
      <div id="taskList" class="card">
          <p style="text-align:center; color:#94a3b8">正在拉取分发给您的教学批次...</p>
      </div>
    </div>
  </div>

  <!-- 成绩报告弹窗 -->
  <div id="resultModal" class="modal-overlay">
      <div class="modal-card">
          <h2 style="color:#1e293b">🎯 教学评估报告</h2>
          <div class="metric-grid">
              <div class="metric-item"><div class="metric-val" id="r-acc">-</div><div class="metric-label">准确率</div></div>
              <div class="metric-item"><div class="metric-val" id="r-sen">-</div><div class="metric-label">敏感度</div></div>
              <div class="metric-item"><div class="metric-val" id="r-spe">-</div><div class="metric-label">特异性</div></div>
              <div class="metric-item"><div class="metric-val" id="r-dur">-</div><div class="metric-label">总耗时</div></div>
          </div>
          <div style="display:flex; gap:10px;">
              <button class="btn btn-view" style="flex:1" onclick="closeModal()">关闭</button>
              <button class="btn btn-start" style="flex:1" id="btn-re-run">重新练习</button>
          </div>
      </div>
  </div>

  <script>
let currentUser = null;

async function loadUser() {
    console.log("🔍 开始加载用户信息...");
    
    try {
        const r = await fetch('/api/users/current');
        console.log("API响应状态码:", r.status);
        
        if (r.ok) {
            const d = await r.json();
            console.log("API响应数据:", d);
            
            if (d && d.data) {
                currentUser = d.data;
                console.log("✅ 用户加载成功:", currentUser);
                
                // 显示用户名
                const nameElem = document.getElementById('u-name');
                const avatarElem = document.getElementById('avatar');
                const orgElem = document.getElementById('currentUserOrg');
                
                if (nameElem) nameElem.textContent = currentUser.username;
                
                if (avatarElem && currentUser.username && currentUser.username.length > 0) {
                    avatarElem.textContent = currentUser.username[0].toUpperCase();
                }
                
                if (orgElem) {
                    orgElem.textContent = currentUser.organization || '未知机构';
                }
                
                // 加载任务列表
                fetchEduTasks();
                console.log("✅ 任务列表加载完成");
                return;
            }
        }
    } catch (e) {
        console.error("❌ Session Error:", e);
    }
    
    // API失败时显示默认值
    showFallbackUI();
}

function showFallbackUI() {
    // 显示默认访客用户信息
    const nameElem = document.getElementById('u-name');
    const avatarElem = document.getElementById('avatar');
    const orgElem = document.getElementById('currentUserOrg');
    
    if (nameElem) nameElem.textContent = "访客用户";
    if (avatarElem) avatarElem.textContent = 'U';
    if (orgElem) orgElem.textContent = '未知机构';
    
    // 无法加载用户，显示提示
    const taskList = document.getElementById('taskList');
    if (taskList) {
        taskList.innerHTML = '<p style="text-align:center;color:#94a3b8;">请先登录后再使用教育模式</p>';
    }
}

async function fetchEduTasks() {
    if (!currentUser || !currentUser.username) {
        console.error("❌ currentUser为空，无法获取任务列表");
        const container = document.getElementById('taskList');
        if (container) {
            container.innerHTML = '<p style="text-align:center;color:#94a3b8;">请先登录</p>';
        }
        return;
    }
    
    try {
        const r = await fetch(`/api/edu/user/tasks/${encodeURIComponent(currentUser.username)}`);
        
        if (!r.ok) {
            console.error("❌ 获取任务列表失败，状态码:", r.status);
            const container = document.getElementById('taskList');
            if (container) {
                container.innerHTML = '<p style="text-align:center;color:#94a3b8;">获取任务失败，状态码:' + r.status + '</p>';
            }
            return;
        }
        
        const { tasks } = await r.json();
        console.log("✅ 任务列表加载成功，共", tasks.length, "个任务");
        
        const container = document.getElementById('taskList');
        container.innerHTML = tasks.length ? '' : '<p style="text-align:center;color:#94a3b8;">暂无已发布的教学任务</p>';
        
        if (tasks.length > 0) {
            tasks.forEach(t => {
                const div = document.createElement('div');
                div.className = `task-card ${t.is_completed ? 'completed' : 'pending'}`;
                div.innerHTML = `
                    <div><div style="font-weight:700;">${t.request_name}</div>
                        <div style="font-size:12px; color:#64748b; margin-top:4px;">
                            病例: ${t.request_case_cnt} | 
                            视频: ${t.request_video_cnt} | 
                            ${t.is_completed ? '✅ 已评估' : '⏳ 待判读'}
                        </div>
                    </div>
                    <div style="display:flex; align-items:center; gap:15px;">
                        ${t.is_completed ? `<div class="score-badge">${(t.last_score*100).toFixed(0)}%</div>` : ''}
                        <button class="btn ${t.is_completed ? 'btn-view' : 'btn-start'}" onclick="handleTask('${t.submission_id}', '${t.request_name}', ${t.is_completed})">
                            ${t.is_completed ? '查看报告' : '开始判读'}
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
        } else {
            console.warn("⚠️ 暂无已发布的教学任务");
        }
    } catch (e) {
        console.error("❌ 获取任务列表失败:", e);
        const container = document.getElementById('taskList');
        if (container) {
            container.innerHTML = '<p style="text-align:center;color:#94a3b8;">获取任务列表失败，请稍后重试</p>';
        }
    }
}

// 确保页面加载时自动加载用户
window.addEventListener('DOMContentLoaded', function() {
    console.log("📄 页面加载完成，开始加载用户信息...");
    loadUser();
});

function handleTask(id, name, isComp) {
    if (!currentUser || !currentUser.username) {
        alert('请先登录');
        return;
    }
    
    if (isComp) {
        openResultModal(id, name);
    } else {
        window.location.href = `/diagnosis?username=${encodeURIComponent(currentUser.username)}&task=${encodeURIComponent(id)}&taskName=${encodeURIComponent(name)}&mode=edu`;
    }
}

async function openResultModal(id, name) {
    if (!currentUser || !currentUser.username) {
        alert('请先登录');
        return;
    }
    
    const modal = document.getElementById('resultModal');
    const modalCard = modal.querySelector('.modal-card');
    modalCard.innerHTML = `
        <h2 style="color:#1e293b">📊 正在生成AI分析报告</h2>
        <p style="color:#64748b; margin:20px 0;">请稍后，系统正在进行深度分析...</p>
        <div style="text-align:center; padding:20px;">
            <div style="font-size:40px; animation: spin 1s linear infinite;">⚙️</div>
        </div>
    `;
    modal.style.display = 'flex';
    
    try {
        const r = await fetch(`/api/edu/user/result/${encodeURIComponent(currentUser.username)}/${id}`);
        if (!r.ok) {
            throw new Error(`获取报告失败: ${r.status}`);
        }
        const data = await r.json();
        
        if (data.llm_analysis_status === "pending") {
            await pollForLLMAnalysis(id, name, data);
        } else if (data.llm_analysis_status === "completed") {
            showCompleteReport(id, name, data);
        } else {
            showBasicReport(id, name, data);
        }
    } catch (e) {
        modalCard.innerHTML = `
            <h2 style="color:#ef4444">❌ 加载失败</h2>
            <p style="color:#64748b; margin:20px 0;">无法获取报告数据: ${e.message}</p>
            <button class="btn btn-view" style="flex:1" onclick="closeModal()">关闭</button>
        `;
    }
}

async function pollForLLMAnalysis(id, name, data) {
    if (!currentUser || !currentUser.username) {
        showBasicReport(id, name, data);
        return;
    }
    
    const modal = document.getElementById('resultModal');
    const modalCard = modal.querySelector('.modal-card');
    
    let attempts = 0;
    const maxAttempts = 30;
    
    const poll = async () => {
        attempts++;
        
        if (attempts > maxAttempts) {
            showBasicReport(id, name, data);
            return;
        }
        
        try {
            const r = await fetch(`/api/edu/user/result/${encodeURIComponent(currentUser.username)}/${id}`);
            if (!r.ok) {
                showBasicReport(id, name, data);
                return;
            }
            const newData = await r.json();
            
            if (newData.llm_analysis_status === "completed") {
                showCompleteReport(id, name, newData);
            } else if (newData.llm_analysis_status === "failed") {
                showBasicReport(id, name, newData);
            } else {
                modalCard.querySelector('p').textContent = `正在分析中... (${attempts}/${maxAttempts})`;
                setTimeout(poll, 1000);
            }
        } catch (e) {
            showBasicReport(id, name, data);
        }
    };
    
    setTimeout(poll, 1000);
}

function showBasicReport(id, name, data) {
    const modal = document.getElementById('resultModal');
    const modalCard = modal.querySelector('.modal-card');
    
    modalCard.innerHTML = `
        <h2 style="color:#1e293b">🎯 教学评估报告</h2>
        <p style="font-size:13px; color:#64748b; margin:5px 0;">${name}</p>
        
        <div class="metric-grid">
            <div class="metric-item">
                <div class="metric-val">${data.accuracy != null ? (data.accuracy * 100).toFixed(1) + '%' : '-'}</div>
                <div class="metric-label">准确率</div>
            </div>
            <div class="metric-item">
                <div class="metric-val">${data.sensitivity != null ? (data.sensitivity * 100).toFixed(1) + '%' : '-'}</div>
                <div class="metric-label">敏感度</div>
            </div>
            <div class="metric-item">
                <div class="metric-val">${data.specificity != null ? (data.specificity * 100).toFixed(1) + '%' : '-'}</div>
                <div class="metric-label">特异性</div>
            </div>
            <div class="metric-item">
                <div class="metric-val">${data.formatted_duration || '-'}</div>
                <div class="metric-label">总耗时</div>
            </div>
        </div>
        
        <div style="margin:20px 0; padding:15px; background:#fef3c7; border-radius:8px; font-size:13px; color:#92400e;">
            ⚠️ AI深度分析报告暂未生成，请稍后再查看
        </div>
        
        <div style="display:flex; gap:10px;">
            <button class="btn btn-view" style="flex:1" onclick="closeModal()">关闭</button>
            <button class="btn btn-start" style="flex:1" onclick="rerunTask('${id}', '${name}')">重新练习</button>
        </div>
    `;
}

function showCompleteReport(id, name, data) {
    const modal = document.getElementById('resultModal');
    const modalCard = modal.querySelector('.modal-card');
    
    let html = `
        <h2 style="color:#1e293b">🎯 教学评估报告</h2>
        <p style="font-size:13px; color:#64748b; margin:5px 0;">${name}</p>
        
        <div class="metric-grid">
            <div class="metric-item">
                <div class="metric-val">${data.accuracy != null ? (data.accuracy * 100).toFixed(1) + '%' : '-'}</div>
                <div class="metric-label">准确率</div>
            </div>
            <div class="metric-item">
                <div class="metric-val">${data.sensitivity != null ? (data.sensitivity * 100).toFixed(1) + '%' : '-'}</div>
                <div class="metric-label">敏感度</div>
            </div>
            <div class="metric-item">
                <div class="metric-val">${data.specificity != null ? (data.specificity * 100).toFixed(1) + '%' : '-'}</div>
                <div class="metric-label">特异性</div>
            </div>
            <div class="metric-item">
                <div class="metric-val">${data.formatted_duration || '-'}</div>
                <div class="metric-label">总耗时</div>
            </div>
        </div>
    `;
    
    if (data.case_details && data.case_details.length > 0) {
        html += `<div style="margin-top:20px; max-height:300px; overflow-y:auto;">`;
        
        data.case_details.forEach(c => {
            const aiCorrect = c.ai_prediction === c.ground_truth;
            const userCorrect = c.user_diagnosis === c.ground_truth;
            const match = c.user_diagnosis === c.ai_prediction;
            
            html += `
                <div style="margin-bottom:15px; padding:12px; background:#f8fafc; border-radius:8px; border-left:4px solid ${aiCorrect && userCorrect ? '#10b981' : (aiCorrect ? '#f59e0b' : '#ef4444')};">
                    <div style="font-weight:600; margin-bottom:5px;">${c.video_name || '病例'}</div>
                    <div style="font-size:12px; line-height:1.6;">
                        <div>👤 您的诊断: <strong>${c.user_diagnosis || '-'}</strong> ${userCorrect ? '✅' : '❌'}</div>
                        <div>🤖 AI诊断: <strong>${c.ai_prediction || '-'}</strong> ${aiCorrect ? '✅' : '❌'}</div>
                        <div>📋 正确答案: <strong>${c.ground_truth || '-'}</strong></div>
                    </div>
                </div>
            `;
        });
        
        html += `</div>`;
    }
    
    if (data.ai_dependency) {
        const total = (data.ai_dependency.correct_reliance || 0) + 
                     (data.ai_dependency.insufficient_reliance || 0) + 
                     (data.ai_dependency.correct_independence || 0) + 
                     (data.ai_dependency.over_reliance || 0);
        
        html += `
            <div style="margin-top:15px;">
                <h3 style="font-size:14px; margin-bottom:12px;">🤖 AI工具使用情况</h3>
                <div style="display:flex; gap:10px; justify-content:space-between;">
                    <div style="flex:1; padding:12px; background:#ecfdf5; border-radius:8px; text-align:center;">
                        <div style="font-size:20px; margin-bottom:5px;">✅</div>
                        <div style="font-size:12px; color:#065f46; font-weight:600;">正确依赖</div>
                        <div style="font-size:18px; font-weight:700; color:#059669;">${data.ai_dependency.correct_reliance || 0}</div>
                        <div style="font-size:10px; color:#065f46;">AI正确+您正确</div>
                    </div>
                    <div style="flex:1; padding:12px; background:#fffbeb; border-radius:8px; text-align:center;">
                        <div style="font-size:20px; margin-bottom:5px;">⚠️</div>
                        <div style="font-size:12px; color:#92400e; font-weight:600;">依赖不足</div>
                        <div style="font-size:18px; font-weight:700; color:#d97706;">${data.ai_dependency.insufficient_reliance || 0}</div>
                        <div style="font-size:10px; color:#92400e;">AI正确+您错误</div>
                    </div>
                    <div style="flex:1; padding:12px; background:#eff6ff; border-radius:8px; text-align:center;">
                        <div style="font-size:20px; margin-bottom:5px;">💪</div>
                        <div style="font-size:12px; color:#1e40af; font-weight:600;">正确独立</div>
                        <div style="font-size:18px; font-weight:700; color:#2563eb;">${data.ai_dependency.correct_independence || 0}</div>
                        <div style="font-size:10px; color:#1e40af;">AI错误+您正确</div>
                    </div>
                    <div style="flex:1; padding:12px; background:#fef2f2; border-radius:8px; text-align:center;">
                        <div style="font-size:20px; margin-bottom:5px;">❌</div>
                        <div style="font-size:12px; color:#991b1b; font-weight:600;">过度依赖</div>
                        <div style="font-size:18px; font-weight:700; color:#dc2626;">${data.ai_dependency.over_reliance || 0}</div>
                        <div style="font-size:10px; color:#991b1b;">AI错误+您错误</div>
                    </div>
                </div>
            </div>
        `;
    }
    
    if (data.llm_analysis && data.llm_analysis.analysis) {
        const analysis = data.llm_analysis.analysis;
        
        html += `
            <div style="margin-top:15px; padding:15px; background:#f0f9ff; border-radius:8px; border-left:3px solid #667eea;">
                <h3 style="font-size:14px; margin-bottom:10px;">🤖 AI专家评价</h3>
                
                <div style="font-size:13px; line-height:1.8;">
                    <p style="margin-bottom:10px;"><strong>整体评价：</strong>${analysis.overall_evaluation || '暂无'}</p>
                    <p style="margin-bottom:10px;"><strong>诊断能力：</strong>${analysis.diagnosis_ability || '暂无'}</p>
                    <p style="margin-bottom:10px;"><strong>AI工具使用：</strong>${analysis.ai_tool_usage || '暂无'}</p>
                </div>
        `;
        
        if (analysis.improvement_suggestions && analysis.improvement_suggestions.length > 0) {
            html += `
                <div style="margin-top:10px;">
                    <strong style="font-size:13px;">💡 改进建议：</strong>
                    <ul style="margin:5px 0; padding-left:20px; font-size:12px;">
                        ${analysis.improvement_suggestions.map(s => `<li style="margin:3px 0;">${s}</li>`).join('')}
                    </ul>
                </div>
            `;
        }
        
        html += `</div>`;
    }
    
    html += `
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn btn-view" style="flex:1" onclick="closeModal()">关闭</button>
            <button class="btn btn-start" style="flex:1" onclick="rerunTask('${id}', '${name}')">重新练习</button>
        </div>
    `;
    
    modalCard.innerHTML = html;
}

function rerunTask(id, name) {
    if (!currentUser || !currentUser.username) {
        alert('请先登录');
        return;
    }
    window.location.href = `/diagnosis?username=${encodeURIComponent(currentUser.username)}&task=${encodeURIComponent(id)}&taskName=${encodeURIComponent(name)}&mode=edu&clearCache=true`;
}

function closeModal() {
    document.getElementById('resultModal').style.display = 'none';
}
  </script>
</body>
</html>
