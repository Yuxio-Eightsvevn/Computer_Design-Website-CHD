<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>任务进度管理 - 儿童先心病诊断平台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f7fa; color: #333; min-height: 100vh;
    }
    .container {
      max-width: 1200px; margin: 30px auto; padding: 0 20px;
      display: flex; gap: 16px; align-items: flex-start;
    }
    .sidebar { width: 220px; }
    .main { flex: 1; }
    .navbar {
      background: linear-gradient(135deg,#667eea 0%,#764ba2 100%);
      color: white; padding: 14px 20px; border-radius: 8px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-top: 20px; }
    
    h2 { font-size: 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; background: #eef2f7; color: #64748b; }
    
    /* 任务列表容器 */
    .task-list { display: flex; flex-direction: column; gap: 12px; min-height: 50px; }
    .row-card {
      border: 1px solid #e6eefc; border-radius: 10px; padding: 16px;
      background: white; display: flex; justify-content: space-between; align-items: center;
      transition: all 0.2s;
    }
    .row-card:hover { border-color: #667eea; box-shadow: 0 4px 12px rgba(102,126,234,0.08); }
    
    .task-info { display: flex; flex-direction: column; gap: 4px; }
    .task-name { font-weight: 700; color: #1e293b; font-size: 16px; }
    .task-meta { font-size: 13px; color: #64748b; }

    /* 按钮组 */
    .btn-group { display: flex; gap: 8px; }
    .btn { padding: 8px 14px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.9; }
    .btn-info { background: #f1f5f9; color: #475569; }
    .btn-diag { background: #10b981; color: white; }
    .btn-del { background: #fee2e2; color: #ef4444; }
    .btn-back { background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); }

    /* 状态点 */
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .dot-processing { background: #3b82f6; box-shadow: 0 0 8px #3b82f6; animation: pulse 1.5s infinite; }
    .dot-completed { background: #10b981; }

    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    
    .empty-hint { padding: 20px; text-align: center; color: #94a3b8; font-size: 14px; border: 1px dashed #e2e8f0; border-radius: 10px; }

    /* [新增] 弹窗样式 */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-card {
      background: white; border-radius: 12px; padding: 24px; width: 90%; max-width: 500px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1); animation: slideIn 0.3s ease;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .detail-item { display: flex; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px solid #f8fafc; padding-bottom: 8px; }
    .detail-label { color: #64748b; font-weight: 600; font-size: 14px; }
    .detail-value { color: #1e293b; font-size: 14px; text-align: right; }
    @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    @media (max-width:960px) { .container { flex-direction:column; } .sidebar { width:100%; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <div class="card" style="margin-top:0">
        <div style="display:flex;align-items:center;gap:10px;">
          <div id="avatarBox" style="width:48px;height:48px;border-radius:24px;background:#e9eefc;display:flex;align-items:center;justify-content:center;color:#667eea; font-weight:700;">U</div>
          <div>
            <div id="currentUserName" style="font-weight:700">加载中...</div>
            <div id="currentUserOrg" style="font-size:13px;color:#666">...</div>
          </div>
        </div>
        <hr style="margin:12px 0;border:none;border-top:1px solid #f0f3ff;">
        <div style="font-size:13px;color:#64748b;line-height:1.6">
            提示：处理中的任务会在后台自动运行，完成后将移入下方“已完成”列表。
        </div>
      </div>
    </div>

    <div class="main">
      <div class="navbar">
        <div style="font-weight:700; font-size:18px;">📋 已上传任务进度</div>
        <button onclick="window.location.href='/dashboard'" class="btn btn-back">返回上传页</button>
      </div>

      <div class="card">
        <h2><span class="status-dot dot-processing"></span>处理中任务 <span id="countBox2" class="badge">0</span></h2>
        <div id="box2" class="task-list">
            <div class="empty-hint">暂无正在处理的任务</div>
        </div>
      </div>

      <div class="card">
        <h2><span class="status-dot dot-completed"></span>已完成任务 <span id="countBox1" class="badge">0</span></h2>
        <div id="box1" class="task-list">
            <div class="empty-hint">暂无已完成的任务记录</div>
        </div>
      </div>
    </div>
  </div>

  <!-- [新增] 弹窗 HTML -->
  <div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 style="margin:0; color:#1e293b">任务详细信息</h3>
        <button onclick="closeModal()" style="border:none; background:none; cursor:pointer; font-size:24px; color:#94a3b8">&times;</button>
      </div>
      <div id="modalContent"></div>
      <button onclick="closeModal()" class="btn btn-info" style="width:100%; margin-top:10px; background:#667eea; color:white">关闭</button>
    </div>
  </div>

  <script>
    let currentUser = null;
    let pollInterval = null;

    async function loadUser() {
      try {
        const r = await fetch('/api/users/current');
        if (r.ok) {
          const d = await r.json();
          currentUser = d.data;
          document.getElementById('currentUserName').textContent = currentUser.username;
          document.getElementById('currentUserOrg').textContent = currentUser.organization || '未知机构';
          document.getElementById('avatarBox').textContent = currentUser.username[0].toUpperCase();
          fetchTasks();
          pollInterval = setInterval(fetchTasks, 5000);
        } else {
          window.location.href = '/login';
        }
      } catch (e) { console.error("Session Error", e); }
    }

    async function fetchTasks() {
      if (!currentUser) return;
      try {
        const r = await fetch(`/api/users/${encodeURIComponent(currentUser.username)}/all-tasks`);
        const data = await r.json();
        renderTaskLists(data.tasks || []);
      } catch (e) { console.error("Fetch Tasks Error", e); }
    }

    function renderTaskLists(tasks) {
      const box1 = document.getElementById('box1');
      const box2 = document.getElementById('box2');
      const completed = tasks.filter(t => t.is_cmp);
      const processing = tasks.filter(t => !t.is_cmp);
      document.getElementById('countBox1').textContent = completed.length;
      document.getElementById('countBox2').textContent = processing.length;
      box1.innerHTML = completed.length ? '' : '<div class="empty-hint">暂无已完成的任务记录</div>';
      completed.forEach(t => box1.appendChild(createTaskRow(t, true)));
      box2.innerHTML = processing.length ? '' : '<div class="empty-hint">暂无正在处理的任务</div>';
      processing.forEach(t => box2.appendChild(createTaskRow(t, false)));
    }

    // [新增] 弹窗控制逻辑
    function showTaskDetail(task) {
      const content = document.getElementById('modalContent');
      content.innerHTML = `
        <div class="detail-item"><span class="detail-label">任务名称</span><span class="detail-value">${task.request_name}</span></div>
        <div class="detail-item"><span class="detail-label">批次ID</span><span class="detail-value" style="font-size:11px">${task.submission_id}</span></div>
        <div class="detail-item"><span class="detail-label">上传时间</span><span class="detail-value">${task.upload_time}</span></div>
        <div class="detail-item"><span class="detail-label">当前状态</span><span class="detail-value" style="color: ${task.is_cmp ? '#10b981' : '#3b82f6'}; font-weight:bold">${task.is_cmp ? '已完成' : '模型判读中'}</span></div>
        ${task.is_cmp ? `<div class="detail-item"><span class="detail-label">完成时间</span><span class="detail-value">${task.cmp_time}</span></div>` : ''}
        <div class="detail-item"><span class="detail-label">病例数量</span><span class="detail-value">${task.request_case_cnt} 个</span></div>
        <div class="detail-item"><span class="detail-label">视频总数</span><span class="detail-value">${task.request_video_cnt} 个</span></div>
        <div class="detail-item"><span class="detail-label">存储路径</span><span class="detail-value" style="font-size:10px; color:#94a3b8; word-break:break-all">${task.request_pos}</span></div>
      `;
      document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modalOverlay').style.display = 'none';
    }

    function createTaskRow(task, isFinished) {
      const row = document.createElement('div');
      row.className = 'row-card';
      const infoHtml = `
        <div class="task-info">
          <div class="task-name">${task.request_name}</div>
          <div class="task-meta">
            上传时间：${task.upload_time} | 病例数：${task.request_case_cnt} | 视频数：${task.request_video_cnt}
            ${isFinished ? `<br/>完成时间：${task.cmp_time}` : ''}
          </div>
        </div>
      `;
      const btnGroup = document.createElement('div');
      btnGroup.className = 'btn-group';
      const btnInfo = document.createElement('button');
      btnInfo.className = 'btn btn-info';
      btnInfo.textContent = '查看详情';
      // [修改] 指向新弹窗函数
      btnInfo.onclick = () => showTaskDetail(task);
      btnGroup.appendChild(btnInfo);
      if (isFinished) {
        const btnDiag = document.createElement('button');
        btnDiag.className = 'btn btn-diag';
        btnDiag.textContent = '进入判读';
        btnDiag.onclick = () => {
            window.location.href = `/diagnosis?submission_id=${task.submission_id}&req_name=${task.request_name}`;
        };
        btnGroup.appendChild(btnDiag);
        const btnDel = document.createElement('button');
        btnDel.className = 'btn btn-del';
        btnDel.textContent = '删除';
        btnDel.onclick = () => deleteTask(task.submission_id);
        btnGroup.appendChild(btnDel);
      }
      row.innerHTML = infoHtml;
      row.appendChild(btnGroup);
      return row;
    }

    async function deleteTask(subId) {
      if (!confirm("确定要永久删除此任务及其所有相关文件吗？该操作不可撤销。")) return;
      try {
        const r = await fetch(`/api/users/${encodeURIComponent(currentUser.username)}/tasks/${subId}`, {
          method: 'DELETE'
        });
        if (r.ok) { fetchTasks(); } else { alert("删除失败"); }
      } catch (e) { alert("网络错误"); }
    }

    loadUser();
  </script>
</body>
</html>
